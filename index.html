<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>💬 Chat</h2>

  <input id="roomId" placeholder="Oda">
  <input id="name" placeholder="İsim">

  <button onclick="joinRoom()">Giriş</button>
</div>

<!-- CHAT -->
<div id="chatApp" style="display:none;">

  <h3 id="roomText"></h3>

  <div id="users"></div>

  <div id="chatBox"></div>

  <div id="typing"></div>

  <div id="emojiBox" style="display:none;">
    <button onclick="addEmoji('😀')">😀</button>
    <button onclick="addEmoji('😂')">😂</button>
    <button onclick="addEmoji('🔥')">🔥</button>
    <button onclick="addEmoji('❤️')">❤️</button>
  </div>

  <button onclick="toggleEmoji()">😊</button>

  <div id="replyBar" style="display:none;"></div>
  <input id="msg" placeholder="Mesaj...">
  <button onclick="sendMessage()">Gönder</button>

  <audio id="notifySound"
  src="https://www.myinstants.com/media/sounds/notification.mp3"></audio>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
