<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1>TAHSİNİN MEKANI</h1>
  <input id="name" placeholder="İsim">
  <input id="roomId" placeholder="Oda">
  <button onclick="joinRoom()">Giriş</button>
</div>

<!-- CHAT -->
<div id="chatApp" style="display:none;">

  <!-- TOP BAR -->
  <h3 id="roomText"></h3>

  <div id="users"></div>

  <!-- CHAT AREA -->
  <div id="chatBox"></div>

  <div id="typing"></div>

  <!-- REPLY BAR -->
  <div id="replyBar"></div>

  <!-- INPUT FIXED BOTTOM -->
  <div id="bottomBar">
    <input id="msg" placeholder="Mesaj...">
    <button onclick="sendMessage()">Gönder</button>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
