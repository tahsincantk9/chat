<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <input id="name" placeholder="İsim">
  <input id="roomId" placeholder="Oda">
  <button onclick="joinRoom()">Giriş</button>
</div>

<!-- CHAT -->
<div id="chatApp" style="display:none;">

  <h3 id="roomText"></h3>

  <div id="users"></div>
  <div id="chatBox"></div>
  <div id="typing"></div>

  <div id="replyBar"></div>

  <input id="msg" placeholder="Mesaj">
  <button onclick="sendMessage()">Gönder</button>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
