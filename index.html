<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Chat Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div id="auth">

<div id="login">

  <h3>Giriş / Kayıt</h3>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Şifre">

  <button onclick="login()">Giriş Yap</button>
  <button onclick="register()">Kayıt Ol</button>

</div>

<div id="roomSelect" style="display:none;">

  <h3>Odaya Gir</h3>

  <input id="name" placeholder="Görünen isim">
  <input id="roomId" placeholder="Oda adı">

  <button onclick="joinRoom()">Giriş</button>

  <div id="chatApp" style="display:none;">

  <div id="users"></div>

  <div id="chatBox"></div>

  <div id="typing"></div>

  <div id="replyBar"></div>

  <input id="msg">
  <button onclick="sendMessage()">Gönder</button>

</div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
